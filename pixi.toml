[workspace]
name = "lipophilicity_pred"
version = "0.1.0"
description = "ML model for lipophilicity prediction (TDC AstraZeneca dataset)"
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"

# PyTorch — pin to a CUDA 12.x build; adjust cuda suffix if needed
pytorch = { version = ">=2.4", channel = "pytorch" }
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }
mkl = ">=2023"

# Scientific core
numpy = ">=1.26"
scipy = ">=1.12"
pandas = ">=2.0"
h5py = ">=3.10"

# Chemistry
rdkit = ">=2024"

# ML
transformers = ">=4.40"

# Utilities
tqdm = "*"
pyyaml = "*"
ipykernel = "*"
marimo = "*"
seaborn = ">=0.13"
scikit-learn = ">=1.4"
shap = ">=0.45"
pyarrow = ">=15"
pytest = ">=8"
pip = "*"
setuptools = "<80"

# Training
lightning = ">=2.3"
wandb = "*"
fuzzywuzzy = ">=0.18.0,<0.19"
pre-commit = ">=4.6.0,<5"

[pypi-dependencies]
lipophilicity-pred = { path = ".", editable = true }
chemprop = ">=2.0"
captum = ">=0.7"

[tasks]
# Run once after `pixi install` to get the pre-built DGL wheel for the installed torch+CUDA version
setup-dgl = """
    python -m pip install dgl \
        -f https://data.dgl.ai/wheels/torch-$(python -c 'import torch; v=torch.__version__; parts=v.split("."); print(f"{parts[0]}.{parts[1]}")')/cu124/repo.html
"""

# PyTDC pins rdkit-pypi (old PyPI name, no py312 wheels) and caps rdkit<2024.3.1,
# both incompatible with our conda rdkit. Install without deps since rdkit,
# pandas, numpy, scikit-learn, and tqdm are all already provided by conda.
setup-tdc = "python -m pip install PyTDC --no-deps"

# --- training ---
train-gnn = "python scripts/train_gnn.py"

# --- transformer pretraining / fine-tuning ---
# Phase 1: pretrain on QM9 (pass --targets to run ablations)
pretrain-transformer = "python scripts/pretrain_qm9.py"
# Phase 2: fine-tune on logD (pass --pretrained-checkpoint for pretrained init)
finetune-transformer  = "python scripts/finetune_logd.py"

# --- notebooks ---
# --no-token skips the login wall; safe for local/remote-SSH use
notebook-gnn         = "marimo edit --no-token notebooks/03_gnn_model.py"
notebook-eda         = "marimo edit --no-token notebooks/01_descriptors.py"
notebook-transformer = "marimo edit --no-token notebooks/04_transformer.py"

# --- tests ---
test = "pytest tests/ -v"
